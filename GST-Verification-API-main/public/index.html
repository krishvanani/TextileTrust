<!DOCTYPE html>
<html>
<head>
  <title>GST Verification</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>GST Verification</h2>

  <input type="text" id="gstin" placeholder="Enter GST Number" />

  <div class="captcha-box">
    <img id="captchaImage" />
    <button onclick="fetchCaptcha()">↻</button>
  </div>

  <input type="text" id="captchaInput" placeholder="Enter Captcha" />

  <button onclick="verifyGST()" id="verifyBtn">Verify GST</button>

  <!-- Loading Spinner -->
  <div id="loader" class="loader hidden"></div>

  <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
